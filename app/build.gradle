plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.leitorbase'
    compileSdk 33

    defaultConfig {
        applicationId "com.leitorbase"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
}
kotlinOptions {
    jvmTarget = "17"
}
    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.10.1'
}
